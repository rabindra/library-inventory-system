spring:
  application:
    name: library-events-producer
  
  profiles:
    active: local

  config:
    activate:
      on-profile: local
  kafka:
    topic:
      name: "library-events"
      replicas: 2
      partitions: 2
    bootstrap-servers: kafka-1839375a-library-inventory.k.aivencloud.com:18357
    security:
      protocol: SASL_SSL
    properties:
      sasl:
        mechanism: SCRAM-SHA-256
        jaas:
          config: >
            org.apache.kafka.common.security.scram.ScramLoginModule required 
            username="avnadmin"
    ssl:
      trust-store-location: truststore.jks
      trust-store-password: ''
    producer:
      key-serializer: org.apache.kafka.common.serialization.IntegerSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 10
